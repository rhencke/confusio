name: Cache dependencies
description: Restore cached redbean, hurl, stylua, and luacheck binaries
runs:
  using: composite
  steps:
    - uses: actions/cache@v4
      with:
        path: redbean.com
        key: redbean-${{ hashFiles('.redbean-version') }}
    - uses: actions/cache@v4
      with:
        path: hurl
        key: hurl-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.hurl-version') }}
    - uses: actions/cache@v4
      with:
        path: stylua
        key: stylua-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.stylua-version') }}
    - uses: actions/cache@v4
      with:
        path: .luarocks
        key: luacheck-${{ runner.os }}-${{ hashFiles('.luacheck-version') }}
